<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Quiz System - Browser Edition</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config Customization -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            glass: "rgba(255, 255, 255, 0.1)",
            glassDark: "rgba(0, 0, 0, 0.4)",
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (Compiles JSX directly in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .glass-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900 via-slate-900 to-black text-slate-100 min-h-screen">
  <div id="root"></div>

  <!-- Main Application Code -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Default Seed Data
    const defaultQuestions = [
      { id: 1, text: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Rome"], correct: "Paris" },
      { id: 2, text: "Which planet is known as the Red Planet?", options: ["Earth", "Mars", "Jupiter", "Venus"], correct: "Mars" },
      { id: 3, text: "What is the largest ocean on Earth?", options: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"], correct: "Pacific Ocean" },
      { id: 4, text: "Who wrote 'Hamlet'?", options: ["Charles Dickens", "William Shakespeare", "Mark Twain", "Jane Austen"], correct: "William Shakespeare" },
      { id: 5, text: "What is the chemical symbol for Gold?", options: ["Ag", "Au", "Pb", "Fe"], correct: "Au" },
      { id: 6, text: "What is the powerhouse of the cell?", options: ["Nucleus", "Ribosome", "Mitochondria", "Endoplasmic Reticulum"], correct: "Mitochondria" },
      { id: 7, text: "What is 8 x 8?", options: ["54", "64", "72", "88"], correct: "64" },
      { id: 8, text: "Who painted the Mona Lisa?", options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Claude Monet"], correct: "Leonardo da Vinci" },
      { id: 9, text: "Which gas do plants absorb from the atmosphere?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: "Carbon Dioxide" },
      { id: 10, text: "How many continents are there?", options: ["5", "6", "7", "8"], correct: "7" }
    ];

    // Local Storage Utils
    const getQuestions = () => {
      const q = localStorage.getItem('quiz_questions');
      if (!q) {
        localStorage.setItem('quiz_questions', JSON.stringify(defaultQuestions));
        return defaultQuestions;
      }
      return JSON.parse(q);
    };

    const saveQuestions = (questions) => {
      localStorage.setItem('quiz_questions', JSON.stringify(questions));
    };

    const getSubmissions = () => {
      return JSON.parse(localStorage.getItem('quiz_submissions') || '[]');
    };

    const addSubmission = (sub) => {
      const subs = getSubmissions();
      subs.push({ ...sub, date: new Date().toLocaleString() });
      localStorage.setItem('quiz_submissions', JSON.stringify(subs));
    };

    // Safe SVG Icons
    const Icons = {
      'graduation-cap': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
      'shield-check': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
      'arrow-left': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
      'arrow-right': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
      'check-circle': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>,
      'chevron-left': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>,
      'chevron-right': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>,
      'trophy': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
      'bar-chart-2': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-4"/></svg>,
      'shield': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      'database': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
      'users': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      'plus': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      'trash-2': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
      'check': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>,
      'log-out': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>,
      'link': <svg fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    };

    const Icon = ({ name, size=24, className="" }) => {
      const svg = Icons[name];
      if (!svg) return null;
      return <div style={{width: size, height: size}} className={className}>{svg}</div>;
    };

    // Components
    function LandingPage({ navigate }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-3xl w-full text-center mt-10">
            <h1 className="text-5xl md:text-6xl font-extrabold text-white mb-6 drop-shadow-xl tracking-tight">
              Welcome to the <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">Online Quiz System</span>
            </h1>
            <p className="text-lg md:text-xl text-slate-300 mb-16 max-w-2xl mx-auto font-medium">
              Please select your portal to continue. Are you a student preparing to take an exam, or an administrator managing questions?
            </p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl mx-auto">
              <button onClick={() => navigate('student-login')} className="group flex flex-col items-center gap-4 text-left p-8 glass-panel rounded-3xl hover:-translate-y-2 transition-all duration-300 border-2 border-transparent hover:border-indigo-400 shadow-xl w-full cursor-pointer">
                <div className="p-6 bg-indigo-500/20 text-indigo-400 rounded-full group-hover:scale-110 transition-transform">
                  <Icon name="graduation-cap" size={48} />
                </div>
                <div className="text-center">
                  <h2 className="text-2xl font-bold text-white tracking-wide">Student Portal</h2>
                  <p className="text-indigo-200 mt-2 font-medium">Take interactive quizzes and view scores.</p>
                </div>
              </button>

              <button onClick={() => navigate('admin-login')} className="group flex flex-col items-center gap-4 text-left p-8 glass-panel rounded-3xl hover:-translate-y-2 transition-all duration-300 border-2 border-transparent hover:border-cyan-400 shadow-xl w-full cursor-pointer">
                <div className="p-6 bg-cyan-500/20 text-cyan-400 rounded-full group-hover:scale-110 transition-transform">
                  <Icon name="shield-check" size={48} />
                </div>
                <div className="text-center">
                  <h2 className="text-2xl font-bold text-white tracking-wide">Admin Portal</h2>
                  <p className="text-cyan-200 mt-2 font-medium">Manage questions and view students.</p>
                </div>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function StudentLogin({ navigate, setStudentData }) {
      const [isLogin, setIsLogin] = useState(true);
      const [name, setName] = useState('');
      const [roll, setRoll] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [msg, setMsg] = useState('');

      const [session, setSession] = useState(() => JSON.parse(localStorage.getItem('quiz_student_session')));

      const handleAction = (e) => {
        e.preventDefault();
        setError(''); setMsg('');
        if (isLogin) {
          if (!roll || !password) return setError('Both fields are required');
          const users = JSON.parse(localStorage.getItem('quiz_users') || '[]');
          const user = users.find(u => u.roll === roll && u.password === password);
          if (!user) return setError('Invalid credentials');
          
          const past = getSubmissions().find(s => s.roll === roll);
          if(past) return setError('You have already taken this quiz. Your previous score was ' + past.score);
          
          localStorage.setItem('quiz_student_session', JSON.stringify(user));
          setSession(user);
          setStudentData(user);
          navigate('quiz');
        } else {
          if (!name || !roll || !password) return setError('All fields are required');
          const users = JSON.parse(localStorage.getItem('quiz_users') || '[]');
          if (users.find(u => u.roll === roll)) return setError('User with this Roll Number already exists');
          users.push({ name, roll, password });
          localStorage.setItem('quiz_users', JSON.stringify(users));
          setIsLogin(true);
          setMsg('Registration successful! Please login.');
          setPassword('');
        }
      };

      if (session) {
         return (
          <div className="min-h-screen flex items-center justify-center p-4">
             <div className="max-w-md w-full glass-panel border border-white/10 rounded-3xl p-10 text-center">
               <button onClick={() => navigate('landing')} className="text-indigo-300 hover:text-white flex items-center gap-2 mb-6 transition">
                 <Icon name="arrow-left" size={16} /> Back
               </button>
               <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-500/20 mb-6 text-indigo-400">
                 <Icon name="users" size={36} />
               </div>
               <h1 className="text-3xl font-bold text-white mb-2">Welcome back!</h1>
               <p className="text-indigo-200 mb-8">{session.name} ({session.roll})</p>
               <div className="space-y-4">
                 <button onClick={() => { 
                   const past = getSubmissions().find(s => s.roll === session.roll);
                   if(past) return setError('You have already taken this quiz. Your previous score was ' + past.score);
                   setStudentData(session); 
                   navigate('quiz'); 
                 }} className="w-full py-4 text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold flex justify-center items-center gap-2">
                   Start Exam <Icon name="arrow-right" size={20} />
                 </button>
                 {error && <div className="text-red-400 text-sm mt-2">{error}</div>}
                 <button onClick={() => {
                   localStorage.removeItem('quiz_student_session');
                   setSession(null);
                   setStudentData(null);
                 }} className="w-full py-4 text-white bg-red-600/20 hover:bg-red-500/30 border border-red-500/50 rounded-xl font-bold flex items-center justify-center gap-2 transition">
                   <Icon name="log-out" size={20} /> Logout
                 </button>
               </div>
             </div>
          </div>
         )
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full glass-panel border border-white/10 rounded-3xl p-10">
            <button onClick={() => navigate('landing')} className="text-indigo-300 hover:text-white flex items-center gap-2 mb-6">
              <Icon name="arrow-left" size={16} /> Back
            </button>
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-500/20 mb-6 text-indigo-400">
                <Icon name="graduation-cap" size={36} />
              </div>
              <h1 className="text-3xl font-bold text-white mb-4">Student Portal</h1>
              
              <div className="flex bg-black/50 rounded-xl p-1 border border-white/10">
                <button onClick={() => {setIsLogin(true); setError(''); setMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${isLogin ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>Login</button>
                <button onClick={() => {setIsLogin(false); setError(''); setMsg('');}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${!isLogin ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>Register</button>
              </div>
            </div>
            {error && <div className="mb-4 bg-red-900/50 border border-red-500 text-red-200 p-3 rounded-xl">{error}</div>}
            {msg && <div className="mb-4 bg-green-900/50 border border-green-500 text-green-200 p-3 rounded-xl">{msg}</div>}
            <form onSubmit={handleAction} className="space-y-6">
              {!isLogin && (
                <div>
                  <label className="block text-sm font-semibold text-indigo-100 mb-2">Full Name</label>
                  <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-white/20 focus:ring-2 focus:ring-indigo-400 bg-black/30 text-white placeholder-slate-500" placeholder="John Doe" />
                </div>
              )}
              <div>
                <label className="block text-sm font-semibold text-indigo-100 mb-2">Roll Number</label>
                <input type="text" value={roll} onChange={e=>setRoll(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-white/20 focus:ring-2 focus:ring-indigo-400 bg-black/30 text-white placeholder-slate-500" placeholder="12345" />
              </div>
              <div>
                <label className="block text-sm font-semibold text-indigo-100 mb-2">Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-white/20 focus:ring-2 focus:ring-indigo-400 bg-black/30 text-white placeholder-slate-500" placeholder="••••••••" />
              </div>
              <button className="w-full py-4 text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold flex items-center justify-center gap-2 mt-4">
                {isLogin ? 'Login' : 'Create Account'} {isLogin && <Icon name="arrow-right" size={20} />}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function QuizPage({ navigate, studentData, setFinalScore }) {
      const [questions] = useState(getQuestions());
      const [answers, setAnswers] = useState({});
      const [current, setCurrent] = useState(0);

      const handleSelect = (opt) => {
        setAnswers({ ...answers, [questions[current].id]: opt });
      };

      const handleSubmit = async () => {
        if(Object.keys(answers).length < questions.length) {
          if(!window.confirm("You have unanswered questions. Are you sure you want to submit?")) return;
        }

        let score = 0;
        questions.forEach(q => {
          if(answers[q.id] === q.correct) score++;
        });

        const subData = {
          name: studentData.name,
          roll: studentData.roll,
          score,
          total: questions.length
        };

        // 1. Save local for immediate UI feedback in purely local mode
        addSubmission(subData);

        // 2. Transmit to actual backend Database
        try {
          await fetch('http://localhost:5000/api/quiz/submit-browser', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(subData)
          });
        } catch (err) {
          console.error("No backend server connecting. Score saved to local cache only.");
        }

        setFinalScore({ score, total: questions.length });
        navigate('result');
      };

      if (!questions.length) return <div className="p-10 text-center text-white">No questions available.</div>

      const q = questions[current];
      const answeredCount = Object.keys(answers).length;

      return (
        <div className="min-h-screen flex flex-col max-w-5xl mx-auto p-4 md:p-8">
          <header className="flex justify-between items-center bg-black/40 border border-white/10 rounded-2xl p-5 mb-6 shadow-lg">
            <div>
              <span className="text-indigo-400 font-bold tracking-widest uppercase text-sm">Question {current + 1} of {questions.length}</span>
              <div className="text-white text-lg font-medium">{studentData.name} ({studentData.roll})</div>
            </div>
            <div className="text-right">
              <div className="text-sm font-medium text-slate-400 mb-2 mt-1">Progress {answeredCount} / {questions.length}</div>
              <div className="w-32 md:w-48 h-2 bg-slate-800 rounded-full overflow-hidden">
                <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${(answeredCount / questions.length) * 100}%` }}></div>
              </div>
            </div>
          </header>

          <main className="flex-grow glass-panel rounded-2xl p-8 flex flex-col">
            <h2 className="text-2xl md:text-3xl font-semibold text-white leading-tight mb-8">
              {q.text}
            </h2>
            
            <div className="space-y-4 flex-grow">
              {q.options.map((opt, idx) => {
                const isSelected = answers[q.id] === opt;
                return (
                  <button 
                    key={idx} onClick={() => handleSelect(opt)}
                    className={`w-full text-left px-6 py-4 rounded-xl border-2 transition-all flex items-center justify-between text-lg ${isSelected ? 'border-indigo-400 bg-indigo-500/20 text-white' : 'border-slate-700 hover:border-indigo-400/50 hover:bg-white/5 text-slate-300'}`}
                  >
                    <span>{['A','B','C','D'][idx]}. {opt}</span>
                    {isSelected && <Icon name="check-circle" size={24} className="text-indigo-400" />}
                  </button>
                )
              })}
            </div>

            <div className="mt-10 flex flex-wrap items-center justify-between gap-4">
               <button onClick={() => setCurrent(p => Math.max(0, p-1))} disabled={current === 0} className="px-6 py-3 border border-slate-600 rounded-xl disabled:opacity-30 hover:bg-slate-800 flex items-center gap-2 font-medium bg-black/30 text-white">
                 <Icon name="chevron-left" /> Previous
               </button>
               
               {answeredCount === questions.length ? (
                 <button onClick={handleSubmit} className="px-8 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.6)] font-extrabold transition">
                   Submit Quiz Answers
                 </button>
               ) : (
                 <button onClick={() => setCurrent(p => Math.min(questions.length-1, p+1))} disabled={current === questions.length - 1} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl flex items-center gap-2 shadow-lg shadow-indigo-500/30 font-bold text-white disabled:opacity-30">
                   Next <Icon name="chevron-right" />
                 </button>
               )}
            </div>
          </main>
        </div>
      );
    }

    function ResultPage({ navigate, finalScore }) {
      const percentage = (finalScore.score / finalScore.total) * 100;
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full glass-panel rounded-3xl p-10 text-center">
             <div className="mx-auto w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white mb-6 shadow-[0_0_40px_rgba(99,102,241,0.5)]">
                <Icon name="trophy" size={48} />
             </div>
             <h1 className="text-3xl font-extrabold text-white mb-2">Quiz Completed!</h1>
             <p className="text-slate-400 font-medium mb-8">Your results have been recorded</p>
             
             <div className="bg-black/30 border border-white/10 rounded-2xl p-6 mb-8">
               <div className="text-indigo-400 font-bold uppercase tracking-widest mb-4 flex items-center justify-center gap-2">
                 <Icon name="bar-chart-2" /> Final Score
               </div>
               <div className="text-6xl font-black text-white mb-2">
                 {finalScore.score} <span className="text-3xl text-slate-500">/ {finalScore.total}</span>
               </div>
               <div className="text-slate-400 font-medium tracking-wide">
                 Score: <span className="text-indigo-400 font-bold">{percentage.toFixed(1)}%</span>
               </div>
             </div>
             <button onClick={() => navigate('landing')} className="w-full py-4 text-white bg-slate-800 border border-slate-600 hover:bg-slate-700 rounded-xl font-bold flex items-center justify-center gap-2">
                <Icon name="arrow-left" /> Return Home
             </button>
          </div>
        </div>
      );
    }

    function AdminLogin({ navigate }) {
      const [user, setUser] = useState('');
      const [pass, setPass] = useState('');
      const [err, setErr] = useState('');
      const handleLogin = (e) => {
        e.preventDefault();
        if(user === 'admin' && pass === 'admin123') navigate('admin-dashboard');
        else setErr('Invalid credentials (try admin / admin123)');
      }
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full glass-panel border border-white/10 rounded-3xl p-10">
            <button onClick={() => navigate('landing')} className="text-cyan-300 hover:text-white flex items-center gap-2 mb-6">
              <Icon name="arrow-left" size={16} /> Back
            </button>
            <div className="text-center mb-8">
               <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-cyan-500/20 mb-6 text-cyan-400">
                <Icon name="shield" size={36} />
              </div>
              <h1 className="text-3xl font-bold text-white">Admin Access</h1>
            </div>
            {err && <div className="mb-4 bg-red-900/50 text-red-200 border border-red-500 p-3 rounded-xl">{err}</div>}
            <form onSubmit={handleLogin} className="space-y-6">
              <input type="text" value={user} onChange={e=>setUser(e.target.value)} placeholder="Username" className="w-full px-5 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-2 focus:ring-cyan-500 text-white" />
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" className="w-full px-5 py-4 bg-black/40 border border-white/10 rounded-xl focus:ring-2 focus:ring-cyan-500 text-white" />
              <button className="w-full py-4 bg-cyan-600 hover:bg-cyan-500 font-bold text-white rounded-xl text-lg shadow-lg shadow-cyan-500/30">Login Server</button>
            </form>
          </div>
        </div>
      )
    }

    function AdminDashboard({ navigate }) {
      const [questions, setQuestions] = useState(getQuestions());
      const [students, setStudents] = useState(getSubmissions());
      const [view, setView] = useState('questions');

      const [text, setText] = useState('');
      const [optA, setOptA] = useState('');
      const [optB, setOptB] = useState('');
      const [optC, setOptC] = useState('');
      const [optD, setOptD] = useState('');
      const [correct, setCorrect] = useState('');

      const handleDelete = (id) => {
        if(!window.confirm("Delete question?")) return;
        const n = questions.filter(q => q.id !== id);
        setQuestions(n); saveQuestions(n);
      }

      const handleAdd = (e) => {
        e.preventDefault();
        const arr = [optA, optB, optC, optD];
        if(!text || arr.some(x=>!x) || !correct) return alert("Fill all fields");
        if(!arr.includes(correct)) return alert("Correct answer must match one of the options");
        
        const q = { id: Date.now(), text, options: arr, correct };
        const updated = [...questions, q];
        setQuestions(updated); saveQuestions(updated);
        
        setText(''); setOptA(''); setOptB(''); setOptC(''); setOptD(''); setCorrect('');
      }

      const handleClearStudents = () => {
        if(window.confirm("Clear all student submissions?")) {
          localStorage.removeItem('quiz_submissions');
          setStudents([]);
        }
      }

      return (
        <div className="min-h-screen max-w-7xl mx-auto p-4 md:p-8">
           <header className="flex items-center justify-between bg-black/40 border border-white/10 p-6 rounded-2xl mb-8 shadow-lg">
             <div className="flex items-center gap-4">
                <div className="p-3 bg-cyan-500/20 text-cyan-400 rounded-xl"><Icon name="shield-check" /></div>
                <div>
                   <h1 className="text-2xl font-bold text-white tracking-widest uppercase">Admin Terminal</h1>
                   <p className="text-slate-400 font-medium">Control questions and view analytics</p>
                </div>
             </div>
             <div className="flex gap-3">
                 <button onClick={() => {
                   const link = window.location.origin + window.location.pathname + '?examid=' + Math.random().toString(36).substr(2, 8).toUpperCase();
                   prompt("Copy this invite link and send it to candidates:", link);
                 }} className="hidden md:flex bg-indigo-600/20 border border-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-xl items-center gap-2 transition shadow-[0_0_15px_rgba(79,70,229,0.2)]">
                    <Icon name="link" size={18} /> Invite Link
                 </button>
                 <button onClick={() => navigate('landing')} className="hidden sm:flex border border-slate-600 hover:bg-slate-800 text-white px-4 py-2 rounded-xl items-center gap-2 transition">
                    <Icon name="log-out" size={18} /> Exit
                 </button>
             </div>
           </header>

           <div className="flex gap-4 mb-6">
              <button onClick={()=>setView('questions')} className={`px-6 py-3 rounded-xl font-bold text-lg flex items-center gap-2 transition ${view==='questions' ? 'bg-cyan-600 text-white' : 'bg-black/30 text-slate-400 border border-white/10'}`}>
                <Icon name="database" size={20} /> Questions Bank
              </button>
              <button onClick={()=>setView('students')} className={`px-6 py-3 rounded-xl font-bold text-lg flex items-center gap-2 transition ${view==='students' ? 'bg-indigo-600 text-white' : 'bg-black/30 text-slate-400 border border-white/10'}`}>
                <Icon name="users" size={20} /> Student Progress
              </button>
           </div>

           {view === 'questions' && (
             <div className="grid lg:grid-cols-3 gap-8">
                <div className="lg:col-span-1">
                  <div className="glass-panel p-6 rounded-2xl sticky top-8">
                     <h2 className="text-xl font-bold text-white mb-6 uppercase tracking-wider border-b border-white/10 pb-4">Add Question</h2>
                     <form onSubmit={handleAdd} className="space-y-4">
                        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Question Text" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white focus:ring-2 focus:ring-cyan-500" rows="3"></textarea>
                        <input value={optA} onChange={e=>setOptA(e.target.value)} placeholder="Option A" className="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-white focus:ring-2 focus:ring-cyan-500" />
                        <input value={optB} onChange={e=>setOptB(e.target.value)} placeholder="Option B" className="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-white focus:ring-2 focus:ring-cyan-500" />
                        <input value={optC} onChange={e=>setOptC(e.target.value)} placeholder="Option C" className="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-white focus:ring-2 focus:ring-cyan-500" />
                        <input value={optD} onChange={e=>setOptD(e.target.value)} placeholder="Option D" className="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-white focus:ring-2 focus:ring-cyan-500" />
                        <select value={correct} onChange={e=>setCorrect(e.target.value)} className="w-full bg-black/50 border border-white/10 p-3 rounded-xl text-cyan-300 focus:ring-2 focus:ring-cyan-500">
                          <option value="">-- Select Correct Answer --</option>
                          {optA && <option value={optA}>{optA}</option>}
                          {optB && <option value={optB}>{optB}</option>}
                          {optC && <option value={optC}>{optC}</option>}
                          {optD && <option value={optD}>{optD}</option>}
                        </select>
                        <button type="submit" className="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold text-white shadow-lg shadow-cyan-500/30 flex items-center justify-center gap-2">
                           <Icon name="plus" size={20} /> Add to Engine
                        </button>
                     </form>
                  </div>
                </div>
                <div className="lg:col-span-2 space-y-4">
                   <div className="flex justify-between items-end mb-2">
                     <h2 className="text-white font-bold text-xl">{questions.length} Active Questions</h2>
                   </div>
                   {questions.map((q, i) => (
                     <div key={q.id} className="glass-panel p-6 rounded-2xl relative group hover:border-cyan-500/50 transition">
                        <button onClick={()=>handleDelete(q.id)} className="absolute top-4 right-4 text-slate-500 hover:text-red-400 bg-black/50 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition"><Icon name="trash-2" size={18} /></button>
                        <div className="text-cyan-400 font-bold mb-2 uppercase text-sm">Question {i+1}</div>
                        <h3 className="text-lg text-white font-medium mb-4">{q.text}</h3>
                        <div className="grid grid-cols-2 gap-2 text-sm">
                           {q.options.map((o, idx) => (
                              <div key={idx} className={`p-3 rounded-lg border ${o===q.correct ? 'bg-cyan-500/10 border-cyan-400/50 text-cyan-200 font-bold flex justify-between' : 'bg-black/30 border-white/10 text-slate-400'}`}>
                                 {o}
                                 {o===q.correct && <Icon name="check" size={16} />}
                              </div>
                           ))}
                        </div>
                     </div>
                   ))}
                </div>
             </div>
           )}

           {view === 'students' && (
             <div className="glass-panel rounded-2xl p-6 overflow-x-auto border border-white/10 relative">
               <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                 <h2 className="text-white font-bold text-xl uppercase tracking-widest flex gap-2 items-center"><Icon name="users" /> Exam Submissions</h2>
                 {students.length > 0 && <button onClick={handleClearStudents} className="bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/50 px-4 py-2 rounded-lg font-bold text-sm tracking-wide">CLEAR SYSTEM</button>}
               </div>
               
               {students.length === 0 ? (
                 <div className="text-center py-20 text-slate-500">No submissions received yet.</div>
               ) : (
                 <table className="w-full text-left border-collapse">
                   <thead>
                     <tr className="text-slate-400 text-sm border-b border-white/10">
                       <th className="p-4 font-semibold uppercase tracking-wider">Date/Time</th>
                       <th className="p-4 font-semibold uppercase tracking-wider">Student Name</th>
                       <th className="p-4 font-semibold uppercase tracking-wider">Roll No.</th>
                       <th className="p-4 font-semibold uppercase tracking-wider">Score</th>
                       <th className="p-4 font-semibold uppercase tracking-wider">Status</th>
                     </tr>
                   </thead>
                   <tbody>
                     {students.slice().reverse().map((s, i) => {
                       const pct = (s.score / s.total) * 100;
                       return (
                       <tr key={i} className="border-b border-white/5 hover:bg-white/5 transition text-white">
                         <td className="p-4 text-slate-300">{s.date}</td>
                         <td className="p-4 font-bold">{s.name}</td>
                         <td className="p-4 text-indigo-300 font-mono">{s.roll}</td>
                         <td className="p-4 font-black text-xl">{s.score} <span className="text-slate-500 text-sm">/ {s.total}</span></td>
                         <td className="p-4">
                           {pct >= 50 ? <span className="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/30 uppercase tracking-widest">Passed</span>
                                      : <span className="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-xs font-bold border border-red-500/30 uppercase tracking-widest">Failed</span>}
                         </td>
                       </tr>
                     )})}
                   </tbody>
                 </table>
               )}
             </div>
           )}
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState(() => {
        if(typeof window !== 'undefined') {
           const query = new URLSearchParams(window.location.search);
           if(query.get('examid')) return 'student-login';
        }
        return 'landing';
      });
      const [studentData, setStudentData] = useState(null);
      const [finalScore, setFinalScore] = useState(null);

      return (
        <div>
           {page === 'landing' && <LandingPage navigate={setPage} />}
           {page === 'student-login' && <StudentLogin navigate={setPage} setStudentData={setStudentData} />}
           {page === 'quiz' && <QuizPage navigate={setPage} studentData={studentData} setFinalScore={setFinalScore} />}
           {page === 'result' && <ResultPage navigate={setPage} finalScore={finalScore} />}
           {page === 'admin-login' && <AdminLogin navigate={setPage} />}
           {page === 'admin-dashboard' && <AdminDashboard navigate={setPage} />}
        </div>
      )
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
